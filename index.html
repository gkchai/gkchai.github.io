  <style>  :root {
    --bg: #ffffff;
    --text: #000000;
    --muted: #4d4d4d;
    --border: #dddddd;
    --link: #000000;
    --link-visited: #000000;
    --code-bg: #f5f5f5;

    --sans: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, ui-sans-serif, system-ui, -apple-system,
      BlinkMacSystemFont, "Segoe UI", Roboto, "Apple Color Emoji", "Segoe UI Emoji";
    --serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  }

  html {
    background: var(--bg);
  }

  body {
    font-family: var(--sans);
    margin: 0 auto;
    padding: 36px 20px 40px;
    max-width: 760px;
    text-align: left;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.62;
    font-size: 1.05rem;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .site-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2.1rem;
  }

  header .title {
    text-decoration: none;
    color: inherit;
  }

  header h2 {
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
    font-size: 1.2rem;
    line-height: 1.3;
  }

  .site-nav {
    margin-top: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.95rem;
    font-size: 0.98rem;
    justify-content: flex-end;
    text-align: right;
  }

  .site-nav a {
    color: var(--text);
    text-decoration: none;
  }

  .site-nav a:hover {
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  main,
  article {
    line-height: 1.75;
  }

  .home-container {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 1.15rem;
    margin-top: 0.2rem;
  }

  .home-photo {
    width: 170px;
    height: 240px;
    object-fit: cover;
    object-position: center top;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .home-profile {
    width: 170px;
    flex-shrink: 0;
  }

  .home-profile .social-links {
    margin-top: 0.5rem;
    justify-content: center;
  }

  .home-content {
    flex: 1;
    min-width: 0;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin: 2.05rem 0 0.72rem;
  }

  h1 {
    font-size: 1.75rem;
    margin-top: 0.4rem;
  }

  h2 {
    font-size: 1.35rem;
  }

  h3 {
    font-size: 1.15rem;
  }

  p,
  ul,
  ol {
    margin: 1rem 0;
  }

  ul,
  ol {
    padding-left: 1.25rem;
  }

  li {
    margin: 0.35rem 0;
  }

  a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  a:visited {
    color: var(--link-visited);
  }

  a:hover {
    text-decoration-thickness: 1.5px;
  }

  img {
    max-width: 100%;
    height: auto;
  }

  hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  code {
    font-family: var(--mono);
    font-size: 0.92em;
    background-color: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.1em 0.35em;
  }

  pre {
    overflow-x: auto;
    background-color: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.85rem;
    margin: 1.25rem 0;
  }

  pre code {
    border: 0;
    background-color: transparent;
    padding: 0;
    display: block;
    white-space: pre;
    font-size: 0.9em;
  }

  div.highlight pre {
    background-color: transparent;
    color: initial;
    border: 0;
    padding: 0;
  }

  div.highlight code {
    background-color: unset;
    color: unset;
  }

  blockquote {
    margin: 1.25rem 0;
    padding: 0.15rem 0 0.15rem 0.9rem;
    border-left: 2px solid var(--border);
    color: var(--muted);
  }

  blockquote p {
    margin: 0.75rem 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.25rem 0;
    font-size: 0.98em;
  }

  th,
  td {
    border-bottom: 1px solid var(--border);
    padding: 0.45rem 0.3rem;
    vertical-align: top;
  }

  th {
    text-align: left;
    font-weight: 600;
  }

  textarea,
  input {
    font-family: var(--sans);
    font-size: 1rem;
  }

  textarea {
    width: 100%;
  }

  footer {
    margin-top: 2rem;
    padding: 1rem 0 0.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    color: var(--muted);
  }

  .social-links {
    display: flex;
    gap: 0.8rem;
    margin-top: 0.5rem;
  }

  .social-icon {
    display: inline-flex;
    align-items: center;
    color: var(--muted);
    text-decoration: none;
  }

  .social-icon svg {
    width: 18px;
    height: 18px;
    display: block;
    fill: currentColor;
  }

  .social-icon:hover {
    color: var(--text);
    text-decoration: none;
  }

  .helptext {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .errorlist {
    color: #b45309;
    font-size: 0.95rem;
  }

  /* blog posts list */
  ul.blog-posts {
    list-style: none;
    padding: 0;
    margin: 1.25rem 0;
  }

  ul.blog-posts li {
    display: grid;
    grid-template-columns: 7.2rem 1fr;
    gap: 0.75rem;
    align-items: baseline;
    padding: 0.24rem 0;
  }

  ul.blog-posts li span {
    color: var(--muted);
    font-size: 0.92rem;
  }

  @media (max-width: 560px) {
    body {
      padding: 22px 16px;
      font-size: 17px;
    }

    .site-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
    }

    .site-nav {
      justify-content: flex-start;
      text-align: left;
      margin-top: 0.2rem;
      gap: 0.75rem;
    }

    .home-container {
      flex-direction: column;
      gap: 0.8rem;
    }

    .home-photo {
      width: 220px;
      height: 300px;
    }

    .home-profile {
      width: 220px;
    }

    ul.blog-posts li {
      grid-template-columns: 1fr;
      gap: 0.2rem;
    }
  }

  /* No dark mode — always light, matching jasonwei.net */

  /* Giallo syntax highlighting (required by Zola 0.22+) */
  .giallo-l {
    display: inline-block;
    min-height: 1lh;
    width: 100%;
  }
  .giallo-ln {
    display: inline-block;
    user-select: none;
    margin-right: 0.4em;
    padding: 0.4em;
    min-width: 3ch;
    text-align: right;
    opacity: 0.8;
  }
</style>
